<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Golf Tracker Icon Generator</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
                background: #f0f0f0;
            }

            .container {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                padding: 20px;
                border-radius: 10px;
            }

            canvas {
                border: 1px solid #ddd;
                margin: 10px;
                border-radius: 10px;
            }

            button {
                background: #667eea;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                margin: 5px;
                font-size: 16px;
            }

            button:hover {
                background: #5568d3;
            }

            .preview-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }

            .preview-item {
                text-align: center;
            }

            h1 {
                color: #333;
            }

            .instructions {
                background: #f8f9fa;
                padding: 15px;
                border-radius: 5px;
                margin: 20px 0;
            }

        </style>
    </head>

    <body>
        <div class="container">
            <h1>🏌️‍♂️ Golf Distance Tracker - Icon Generator</h1>

            <div class="instructions">
                <h3>Instructions:</h3>
                <ol>
                    <li>Click "Generate Icons" to create all required sizes</li>
                    <li>Right-click each icon and "Save image as..."</li>
                    <li>Save them to the <code>/public</code> folder with the correct names</li>
                    <li>Icons will have transparent backgrounds for iOS maskable support</li>
                </ol>
            </div>

            <button onclick="generateAllIcons()">Generate All Icons</button>

            <div class="preview-grid" id="iconGrid"></div>
        </div>

        <script>
            const iconSizes = [
                { size: 16, name: 'favicon-16x16.png' },
                { size: 32, name: 'favicon-32x32.png' },
                { size: 48, name: 'favicon-48x48.png' },
                { size: 64, name: 'favicon-64x64.png' },
                { size: 152, name: 'apple-touch-icon-152x152.png' },
                { size: 167, name: 'apple-touch-icon-167x167.png' },
                { size: 180, name: 'apple-touch-icon-180x180.png' },
                { size: 192, name: 'logo192.png' },
                { size: 512, name: 'logo512.png' }
            ];

            function drawGolfIcon(ctx, size) {
                // Clear canvas
                ctx.clearRect(0, 0, size, size);

                // Background gradient circle (for maskable)
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                ctx.fill();

                // White inner circle
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(size / 2, size / 2, size / 2 - size * 0.08, 0, Math.PI * 2);
                ctx.fill();

                // Scale factor for elements
                const scale = size / 512;

                // Draw golf flag
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 8 * scale;
                ctx.lineCap = 'round';

                // Flagpole
                const poleX = size * 0.5;
                const poleBottom = size * 0.75;
                const poleTop = size * 0.25;

                ctx.beginPath();
                ctx.moveTo(poleX, poleBottom);
                ctx.lineTo(poleX, poleTop);
                ctx.stroke();

                // Flag
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.moveTo(poleX, poleTop);
                ctx.lineTo(poleX + size * 0.2, poleTop + size * 0.08);
                ctx.lineTo(poleX, poleTop + size * 0.16);
                ctx.closePath();
                ctx.fill();

                // Golf ball
                const ballX = size * 0.35;
                const ballY = size * 0.65;
                const ballRadius = size * 0.08;

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
                ctx.fill();

                // Ball dimples
                ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
                const dimpleSize = ballRadius * 0.25;
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        const dx = (i - 1) * dimpleSize * 0.8;
                        const dy = (j - 1) * dimpleSize * 0.8;
                        ctx.beginPath();
                        ctx.arc(ballX + dx, ballY + dy, dimpleSize * 0.4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Distance marker arc
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 3 * scale;
                ctx.setLineDash([5 * scale, 3 * scale]);
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballRadius * 2.5, -0.5, 0.5);
                ctx.stroke();
                ctx.setLineDash([]);

                // Distance text
                if (size >= 192) {
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${ size * 0.12 }px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('YDS', size * 0.5, size * 0.88);
                }
            }

            function generateAllIcons() {
                const grid = document.getElementById('iconGrid');
                grid.innerHTML = '';

                iconSizes.forEach(({ size, name }) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');

                    drawGolfIcon(ctx, size);

                    const container = document.createElement('div');
                    container.className = 'preview-item';

                    const label = document.createElement('div');
                    label.textContent = `${ size }×${ size }`;
                    label.style.fontWeight = 'bold';
                    label.style.marginBottom = '5px';

                    const filename = document.createElement('div');
                    filename.textContent = name;
                    filename.style.fontSize = '12px';
                    filename.style.color = '#666';
                    filename.style.marginBottom = '10px';

                    const downloadBtn = document.createElement('button');
                    downloadBtn.textContent = 'Download';
                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.download = name;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    };

                    container.appendChild(label);
                    container.appendChild(filename);
                    container.appendChild(canvas);
                    container.appendChild(downloadBtn);

                    grid.appendChild(container);
                });
            }

            // Generate on load
            window.onload = generateAllIcons;
        </script>
    </body>

</html>
